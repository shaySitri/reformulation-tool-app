[pytest]
# Run tests from the tests/ directory
testpaths = tests

# Add the repository root to sys.path so `import backend` and
# `import command_reformulatuin_script` both work without any __init__.py
# tricks or manual sys.path manipulation in test files.
# Requires pytest >= 7.0.
pythonpath = .

# Verbose output by default — shows each test name and PASS/FAIL status.
addopts = -v

# Show local variables in tracebacks for easier debugging of failures.
# addopts = -v --tb=short
