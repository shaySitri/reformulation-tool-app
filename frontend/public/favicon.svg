<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Microphone body -->
  <rect x="24" y="8" width="16" height="24" rx="8" fill="white" opacity="0.95"/>

  <!-- Microphone stand arc -->
  <path d="M16 30 Q16 44 32 44 Q48 44 48 30" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Microphone stem -->
  <line x1="32" y1="44" x2="32" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Mic base -->
  <line x1="24" y1="52" x2="40" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Hebrew Alef (א) inside the mic — represents Hebrew language -->
  <text
    x="32"
    y="25"
    font-family="serif"
    font-size="14"
    font-weight="bold"
    fill="#fbbf24"
    text-anchor="middle"
    dominant-baseline="middle"
  >א</text>

  <!-- Sound wave lines to the right of mic — voice activity -->
  <path d="M51 22 Q54 26 51 30" stroke="url(#wave)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M54 18 Q59 26 54 34" stroke="url(#wave)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Small arrow below — reformulation/transformation concept -->
  <path d="M20 57 L44 57" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <path d="M39 54 L44 57 L39 60" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
